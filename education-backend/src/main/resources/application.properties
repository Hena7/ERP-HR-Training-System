# Application
spring.application.name=education-module

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/education_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=INSA-Education-Module-Secret-Key-2024-Must-Be-At-Least-256-Bits-Long
jwt.expiration=86400000

# Server (changed to 8081 to avoid conflict with Keycloak on 8080)
server.port=8081

# Keycloak OAuth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/erp-system
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/erp-system/protocol/openid-connect/certs

# Logging
logging.level.com.insa.education=INFO
logging.level.org.springframework.security=WARN
logging.file.name=backend.log
