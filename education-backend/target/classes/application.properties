# Application
spring.application.name=education-module

# Database - H2 for development (switch to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:educationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=INSA-Education-Module-Secret-Key-2024-Must-Be-At-Least-256-Bits-Long
jwt.expiration=86400000

# Server (changed to 8081 to avoid conflict with Keycloak on 8080)
server.port=8081

# Keycloak OAuth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/erp-system
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/erp-system/protocol/openid-connect/certs

# Logging
logging.level.com.insa.education=INFO
logging.level.org.springframework.security=WARN
