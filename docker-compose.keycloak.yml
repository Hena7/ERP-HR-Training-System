services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: erp-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import
